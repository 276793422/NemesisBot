name: monitor
description: "зӣ‘жҺ§пјҡе®ҡж—¶жЈҖжҹҘвҶ’ејӮеёёжЈҖжөӢвҶ’йҖҡзҹҘ"
version: "1.0"
triggers:
  - type: cron
    config: { schedule: "*/5 * * * *" }
nodes:
  - id: check
    type: http
    config: { url: "{{monitor_url}}", method: "GET" }
  - id: evaluate
    type: condition
    config: { expression: "{{check.status}} != 200" }
    depends_on: [check]
  - id: alert
    type: transform
    config: { template: "вҡ пёҸ е‘ҠиӯҰ: {{monitor_url}} иҝ”еӣһзҠ¶жҖҒ {{check.status}}" }
    depends_on: [evaluate]
edges:
  - from: check
    to: evaluate
  - from: evaluate
    to: alert
    condition: "true"
