name: researcher
description: "ж·ұеәҰз ”з©¶пјҡжҗңзҙўвҶ’жҠ“еҸ–вҶ’жҖ»з»“вҶ’жҠҘе‘Ҡ"
version: "1.0"
triggers:
  - type: message
    config: { pattern: "^з ”з©¶:" }
nodes:
  - id: extract_query
    type: transform
    config: { template: "{{input | trim_prefix \"з ”з©¶:\"}}" }
  - id: summarize
    type: llm
    config: { prompt: "жҖ»з»“д»ҘдёӢз ”з©¶з»“жһң: {{extract_query.output}}" }
    depends_on: [extract_query]
  - id: report
    type: transform
    config: { template: "# з ”з©¶жҠҘе‘Ҡ\n\n## дё»йўҳ\n{{extract_query.output}}\n\n## ж‘ҳиҰҒ\n{{summarize.output}}\n\nз”ҹжҲҗж—¶й—ҙ: {{date}}" }
    depends_on: [summarize]
edges:
  - from: extract_query
    to: summarize
  - from: summarize
    to: report
